# Based on pyproject_cc.toml, but with some updates to dependencies and metadata for the gigagpt project.

[project]
name = "gigagpt"
version = "0.1.0"
description = "A simple, readable GPT training codebase for Cerebras systems"
readme = "README.md"
requires-python = ">=3.8,<3.9"
dependencies = [
  "torch==2.4.0",
  "torchvision==0.19.0",
  "transformers==4.45.2",
  "tokenizers==0.20.1",
  "tiktoken==0.7.0",
  "tqdm==4.66.1",
  "cerebras_pytorch==2.5.0",
]

[project.optional-dependencies]
data = [
  "datasets==2.19.1",
]

[tool.uv]
package = false
required-environments = ["sys_platform == 'linux' and platform_machine == 'x86_64'"]
# Limit resolution to the platforms this project actually targets.
environments = [
    "sys_platform == 'darwin'",
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
]

[tool.uv.sources]
# For CPU/CSX runs. Remove both entries for GPU runs (torch/torchvision will be resolved from PyPI).
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
